<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stargate Control</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#04060d;color:#b0c8e0;
  font-family:'Courier New',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3rem;
  overflow:hidden;position:relative;
}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.ui{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2.5rem}
h1{font-size:1.1rem;letter-spacing:.45em;color:#6090b8;text-shadow:0 0 24px #0e3060}
.subtitle{font-size:.65rem;letter-spacing:.3em;color:#304860;margin-top:-.5rem}
.cards{display:flex;gap:2.5rem}
.card{
  width:200px;padding:2rem 1.5rem;
  border:1px solid #152840;border-radius:3px;
  background:rgba(6,12,22,.85);
  cursor:pointer;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:1.1rem;
  text-decoration:none;color:inherit;
  transition:border-color .25s,background .25s,box-shadow .25s;
}
.card:hover{
  border-color:#1e5080;background:rgba(10,22,42,.95);
  box-shadow:0 0 30px #0a2040;
}
.card svg{opacity:.65;transition:opacity .25s}
.card:hover svg{opacity:1}
.card-title{font-size:.8rem;letter-spacing:.22em;color:#80aad0}
.card-desc{font-size:.62rem;color:#3a5878;line-height:1.6}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <svg width="90" height="90" viewBox="0 0 90 90" style="opacity:.5">
    <circle cx="45" cy="45" r="40" fill="none" stroke="#1a3a60" stroke-width="3"/>
    <circle cx="45" cy="45" r="32" fill="none" stroke="#0e2440" stroke-width="1.5"/>
    <!-- 9 chevrons -->
    <g id="chevs"></g>
    <circle cx="45" cy="45" r="10" fill="none" stroke="#0e2440" stroke-width="1"/>
  </svg>

  <h1>STARGATE CONTROL SYSTEM</h1>
  <p class="subtitle">SELECT INTERFACE</p>

  <div class="cards">
    <a href="/dhd" class="card">
      <!-- DHD icon: concentric rings of dots + red center -->
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="37" fill="none" stroke="#1a3050" stroke-width="1.5"/>
        <circle cx="40" cy="40" r="27" fill="none" stroke="#0e2040" stroke-width="1"/>
        <!-- inner ring symbols -->
        <circle cx="40" cy="22" r="2.8" fill="#2a5080"/>
        <circle cx="52" cy="29" r="2.8" fill="#2a5080"/>
        <circle cx="56" cy="40" r="2.8" fill="#2a5080"/>
        <circle cx="52" cy="51" r="2.8" fill="#2a5080"/>
        <circle cx="40" cy="56" r="2.8" fill="#2a5080"/>
        <circle cx="28" cy="51" r="2.8" fill="#2a5080"/>
        <circle cx="24" cy="40" r="2.8" fill="#2a5080"/>
        <circle cx="28" cy="29" r="2.8" fill="#2a5080"/>
        <!-- outer ring -->
        <circle cx="40" cy="12" r="2.2" fill="#1a3a58"/>
        <circle cx="56" cy="17" r="2.2" fill="#1a3a58"/>
        <circle cx="66" cy="30" r="2.2" fill="#1a3a58"/>
        <circle cx="68" cy="47" r="2.2" fill="#1a3a58"/>
        <circle cx="60" cy="62" r="2.2" fill="#1a3a58"/>
        <circle cx="40" cy="68" r="2.2" fill="#1a3a58"/>
        <circle cx="20" cy="62" r="2.2" fill="#1a3a58"/>
        <circle cx="12" cy="47" r="2.2" fill="#1a3a58"/>
        <circle cx="14" cy="30" r="2.2" fill="#1a3a58"/>
        <circle cx="24" cy="17" r="2.2" fill="#1a3a58"/>
        <!-- center red dome -->
        <radialGradient id="rdg" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#ff5555"/>
          <stop offset="55%" stop-color="#bb1111"/>
          <stop offset="100%" stop-color="#550000"/>
        </radialGradient>
        <circle cx="40" cy="40" r="10" fill="url(#rdg)" stroke="#ff2222" stroke-width="1.5"/>
      </svg>
      <div class="card-title">DIAL HOME DEVICE</div>
      <div class="card-desc">Press glyphs on the pad, activate with the central dome</div>
    </a>

    <a href="/scdc" class="card">
      <!-- SCDC icon: terminal with gate ring -->
      <svg width="80" height="80" viewBox="0 0 80 80">
        <rect x="4" y="10" width="72" height="60" rx="3" fill="none" stroke="#1a3050" stroke-width="1.5"/>
        <rect x="4" y="10" width="72" height="10" rx="2" fill="#07101e" stroke="#1a3050" stroke-width="1"/>
        <circle cx="10" cy="15" r="1.5" fill="#2a4060"/>
        <circle cx="16" cy="15" r="1.5" fill="#2a4060"/>
        <circle cx="22" cy="15" r="1.5" fill="#2a4060"/>
        <!-- gate ring inside screen -->
        <circle cx="40" cy="45" r="20" fill="none" stroke="#0e3020" stroke-width="2.5"/>
        <circle cx="40" cy="45" r="14" fill="none" stroke="#071810" stroke-width="1"/>
        <!-- chevrons lit -->
        <polygon points="40,25 37,30 43,30" fill="#663300" stroke="#cc6600" stroke-width=".8"/>
        <polygon points="55,30 52,34 57,36" fill="#663300" stroke="#cc6600" stroke-width=".8"/>
        <polygon points="60,45 55,43 55,47" fill="#1a4a1a" stroke="#2a8a2a" stroke-width=".8"/>
        <!-- address slots -->
        <rect x="12" y="68" width="8" height="5" rx="1" fill="#07101e" stroke="#1a4030" stroke-width=".8"/>
        <rect x="22" y="68" width="8" height="5" rx="1" fill="#07101e" stroke="#1a4030" stroke-width=".8"/>
        <rect x="32" y="68" width="8" height="5" rx="1" fill="#07101e" stroke="#1a4030" stroke-width=".8"/>
        <rect x="42" y="68" width="8" height="5" rx="1" fill="#07101e" stroke="#1a4030" stroke-width=".8"/>
        <rect x="52" y="68" width="8" height="5" rx="1" fill="#07101e" stroke="#1a4030" stroke-width=".8"/>
        <rect x="62" y="68" width="8" height="5" rx="1" fill="#07101e" stroke="#1a4030" stroke-width=".8"/>
      </svg>
      <div class="card-title">DIALING COMPUTER</div>
      <div class="card-desc">SCDC interface with chevron encoding and iris control</div>
    </a>
  </div>
</div>

<script>
// starfield
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function drawStars() {
  canvas.width = innerWidth; canvas.height = innerHeight;
  ctx.fillStyle = '#04060d';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<220;i++){
    const x=Math.random()*canvas.width, y=Math.random()*canvas.height;
    const r=Math.random()*1.3+.1, a=Math.random()*.85+.15;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,210,255,${a})`; ctx.fill();
  }
}
drawStars();
window.addEventListener('resize', drawStars);

// rotating gate ring chevrons in header icon
const chevG = document.getElementById('chevs');
const cx=45, cy=45, r=36;
let rot=0;
for(let i=0;i<9;i++){
  const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
  poly.dataset.i = i;
  chevG.appendChild(poly);
}
function updateChevs(){
  const kids = chevG.querySelectorAll('polygon');
  kids.forEach((p,i)=>{
    const a = (rot + i*40) * Math.PI/180;
    const px=cx+r*Math.cos(a), py=cy+r*Math.sin(a);
    const w=3.5, ir=r-10;
    const perp1=[px+w*Math.cos(a+Math.PI/2), py+w*Math.sin(a+Math.PI/2)];
    const perp2=[px+w*Math.cos(a-Math.PI/2), py+w*Math.sin(a-Math.PI/2)];
    const tip=[cx+ir*Math.cos(a), cy+ir*Math.sin(a)];
    p.setAttribute('points',`${perp1[0]},${perp1[1]} ${perp2[0]},${perp2[1]} ${tip[0]},${tip[1]}`);
    p.setAttribute('fill','#0e2040');
    p.setAttribute('stroke','#1a3a60');
    p.setAttribute('stroke-width','0.8');
  });
}
updateChevs();
setInterval(()=>{ rot=(rot+.15)%360; updateChevs(); }, 30);
</script>
</body>
</html>
